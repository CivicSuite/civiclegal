<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">CivicLegal v0.1.0 architecture</title>
  <desc id="desc">City legal records flow through access-tier filtering into citation-first search and attorney-reviewed drafting helpers.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#eef3fb"/><stop offset="100%" stop-color="#fff8ea"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1b2a38" flood-opacity="0.16"/></filter><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#253d63"/></marker></defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="70" y="82" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#1b2026">CivicLegal v0.1.0</text>
  <text x="70" y="120" font-family="Aptos, Segoe UI, sans-serif" font-size="20" fill="#3b516b">Internal legal-record support without legal-advice automation</text>
  <g filter="url(#shadow)"><rect x="70" y="180" width="270" height="150" rx="24" fill="#ffffff" stroke="#bccce2"/><text x="100" y="226" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#253d63">City Legal Corpus</text><text x="100" y="262" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#1b2026">Code, ordinances, minutes</text><text x="100" y="286" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#1b2026">Contracts, opinions, memos</text></g>
  <g filter="url(#shadow)"><rect x="460" y="150" width="310" height="240" rx="26" fill="#ffffff" stroke="#bccce2"/><text x="500" y="196" font-family="Aptos, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#253d63">CivicLegal API</text><text x="500" y="236" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#1b2026">Access-tier filtering</text><text x="500" y="262" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#1b2026">Citation-first search</text><text x="500" y="288" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#1b2026">Precedent lookup</text><text x="500" y="314" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#1b2026">Memo / ordinance scaffolds</text><text x="500" y="340" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#1b2026">Litigation-hold flags</text></g>
  <g filter="url(#shadow)"><rect x="890" y="180" width="240" height="150" rx="24" fill="#ffffff" stroke="#bccce2"/><text x="920" y="226" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#253d63">Attorney Review</text><text x="920" y="262" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#1b2026">Human legal judgment</text><text x="920" y="286" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#1b2026">Privilege controlled by counsel</text></g>
  <path d="M340 255 C390 255 410 255 452 255" fill="none" stroke="#253d63" stroke-width="4" marker-end="url(#arrow)"/><path d="M770 255 C820 255 845 255 882 255" fill="none" stroke="#253d63" stroke-width="4" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect x="150" y="485" width="900" height="110" rx="24" fill="#fff9ed" stroke="#b38331"/><text x="190" y="532" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#704d17">Boundary</text><text x="190" y="568" font-family="Aptos, Segoe UI, sans-serif" font-size="17" fill="#1b2026">No legal advice, Westlaw/Lexis replacement, autonomous legal conclusions, court filing, live LLM calls, or legal-system connectors ship in v0.1.0.</text></g>
</svg>
