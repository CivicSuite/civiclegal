<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">CivicBudget v0.1.0 architecture</title>
  <desc id="desc">Staff-provided budget facts flow into CivicBudget drafting helpers, then finance review approves outputs before future CivicClerk and CivicData handoffs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#fff8e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1b2a38" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#24507a"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="70" y="82" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#17202a">CivicBudget v0.1.0</text>
  <text x="70" y="120" font-family="Aptos, Segoe UI, sans-serif" font-size="20" fill="#35516b">Budget narrative support without replacing official finance systems</text>
  <g filter="url(#shadow)">
    <rect x="70" y="180" width="250" height="140" rx="24" fill="#ffffff" stroke="#bad0e8"/>
    <text x="100" y="226" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#24507a">Staff Inputs</text>
    <text x="100" y="262" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#17202a">Line items</text>
    <text x="100" y="286" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#17202a">Department priorities</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="460" y="150" width="300" height="240" rx="26" fill="#ffffff" stroke="#bad0e8"/>
    <text x="500" y="196" font-family="Aptos, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#24507a">CivicBudget API</text>
    <text x="500" y="236" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#17202a">Variance analysis</text>
    <text x="500" y="262" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#17202a">Narrative drafts</text>
    <text x="500" y="288" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#17202a">Memo drafts</text>
    <text x="500" y="314" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#17202a">Packet checklists</text>
    <text x="500" y="340" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#17202a">Resident summaries</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="890" y="180" width="240" height="140" rx="24" fill="#ffffff" stroke="#bad0e8"/>
    <text x="920" y="226" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#24507a">Finance Review</text>
    <text x="920" y="262" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#17202a">Human approval</text>
    <text x="920" y="286" font-family="Aptos, Segoe UI, sans-serif" font-size="16" fill="#17202a">Official systems remain source</text>
  </g>
  <path d="M320 250 C370 250 405 250 452 250" fill="none" stroke="#24507a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M760 250 C810 250 840 250 882 250" fill="none" stroke="#24507a" stroke-width="4" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="160" y="485" width="880" height="110" rx="24" fill="#fffaf0" stroke="#bf8f35"/>
    <text x="200" y="532" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#7b5318">Boundary</text>
    <text x="200" y="568" font-family="Aptos, Segoe UI, sans-serif" font-size="17" fill="#17202a">No ERP, accounting, payroll, official approvals, budget adoption, live LLM calls, or live finance connectors ship in v0.1.0.</text>
  </g>
  <text x="70" y="665" font-family="Aptos, Segoe UI, sans-serif" font-size="17" fill="#35516b">Future handoffs: CivicClerk hearing packet workflow and CivicData transparency publishing.</text>
</svg>
